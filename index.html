<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FDF0F3" />
    <title>Vó Neis Confeitaria — Cardápio</title>
    <meta
      name="description"
      content="Cardápio da Vó Neis Confeitaria: fatias de bolo, bolos inteiros e doces feitos com carinho. Faça seu pedido pelo WhatsApp!"
    />
    <meta property="og:title" content="Vó Neis Confeitaria — Cardápio" />
    <meta
      property="og:description"
      content="Fatias de bolo, bolos inteiros e doces feitos com carinho. Peça pelo WhatsApp!"
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <link rel="preload" href="/logo.png" as="image" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400;1,500;1,600&family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ——— Splash screen (inline: aparece instantaneamente, antes do JS) ——— */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background:
          radial-gradient(420px 420px at 15% 10%, rgba(217, 106, 133, 0.10), transparent 70%),
          radial-gradient(480px 480px at 85% 90%, rgba(217, 106, 133, 0.12), transparent 70%),
          #fdf0f3;
        opacity: 1;
        transition: opacity 0.55s ease, visibility 0.55s ease;
      }
      #splash.splash-hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #splash img {
        width: clamp(130px, 34vw, 210px);
        height: clamp(130px, 34vw, 210px);
        animation: splash-pop 0.9s cubic-bezier(0.22, 1.2, 0.36, 1) both,
          splash-float 2.6s ease-in-out 0.9s infinite;
        filter: drop-shadow(0 12px 28px rgba(217, 106, 133, 0.28));
      }
      #splash .splash-title {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-style: italic;
        font-weight: 600;
        font-size: clamp(24px, 5.4vw, 34px);
        color: #4a2c1a;
        letter-spacing: 0.02em;
        animation: splash-fade 0.8s ease 0.25s both;
      }
      #splash .splash-sub {
        font-family: 'DM Sans', system-ui, sans-serif;
        font-size: clamp(11px, 2.8vw, 13px);
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(74, 44, 26, 0.45);
        animation: splash-fade 0.8s ease 0.45s both;
      }
      #splash .splash-dots {
        display: flex;
        gap: 7px;
        margin-top: 6px;
        animation: splash-fade 0.6s ease 0.6s both;
      }
      #splash .splash-dots span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #d96a85;
        animation: splash-bounce 1.1s ease-in-out infinite;
      }
      #splash .splash-dots span:nth-child(2) { animation-delay: 0.15s; }
      #splash .splash-dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes splash-pop {
        from { opacity: 0; transform: scale(0.7); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes splash-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-7px); }
      }
      @keyframes splash-fade {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes splash-bounce {
        0%, 100% { transform: translateY(0); opacity: 0.45; }
        50% { transform: translateY(-6px); opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #splash img, #splash .splash-dots span { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="splash" role="status" aria-label="Carregando">
      <img src="/logo.png" alt="" />
      <div class="splash-title">Vó Neis Confeitaria</div>
      <div class="splash-sub">feito com amor</div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
